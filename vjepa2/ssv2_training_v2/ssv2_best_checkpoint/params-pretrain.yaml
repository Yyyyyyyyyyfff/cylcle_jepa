app: vjepa
cpus_per_task: 4
data:
  batch_size: 16
  crop_size: 256
  dataset_fpcs:
  - 16
  dataset_type: VideoDataset
  datasets:
  - /home/miaochengyu/VJEPA/vjepa2/ssv2_train.csv
  datasets_weights:
  - 1.0
  fps: 4
  num_workers: 4
  patch_size: 16
