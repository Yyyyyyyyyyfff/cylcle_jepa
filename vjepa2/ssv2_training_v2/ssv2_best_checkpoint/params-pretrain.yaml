  - 0.75
  - 1.5
  full_complement: false
  max_keep: null
  max_temporal_keep: 1.0
  num_blocks: 8
  spatial_scale:
  - 0.15
  - 0.15
  temporal_scale:
  - 1.0
  - 1.0
mem_per_gpu: 40G
meta:
  dtype: bfloat16
  eval_freq: 1000
  load_checkpoint: true
  load_encoder: true
  load_predictor: true
