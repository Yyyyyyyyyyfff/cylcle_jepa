  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 0.75
  - 1.35
  random_resize_scale:
  - 0.3
  - 1.0
  reprob: 0.0
debugmode: true
folder: /home/miaochengyu/VJEPA/vjepa2/ssv2_training_v2/ssv2_best_checkpoint
loss:
  loss_exp: 1.0
mask:
